<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OBM System">
    
    <!-- Block search engine indexing -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    
    <!-- Block social media previews -->
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <meta name="twitter:card" content="" />
    <meta name="twitter:title" content="" />
    <meta name="twitter:description" content="" />
    
    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://gpmwkgkvikvlzvqpbqus.supabase.co">
    <!-- Google Fonts - Open Sans (non-render-blocking) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"></noscript>
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="/pwa-192.png">
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <title>Система за управление</title>
    <meta name="description" content="" />
    
    <!-- No cache for HTML shell - ensures latest app version loads -->
    <!-- Static assets (JS/CSS) are cached via CDN/server headers with content hashes -->
    <meta http-equiv="Cache-Control" content="no-cache" />
    <meta http-equiv="Pragma" content="no-cache" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Early boot guard: clean preview tokens before anything else
      (function() {
        try {
          var s = window.location.search;
          if (s.indexOf('__lovable_token=') !== -1 || s.indexOf('_lovable_token=') !== -1) {
            var url = new URL(window.location.href);
            url.searchParams.delete('__lovable_token');
            url.searchParams.delete('_lovable_token');
            var clean = url.pathname + (url.searchParams.toString() ? '?' + url.searchParams.toString() : '') + url.hash;
            history.replaceState({}, '', clean);
          }
        } catch(e) {}
      })();
    </script>
    <script>
      // Emergency SW recovery: if page is blank for too long, unregister SW and reload
      (function() {
        var timeout = setTimeout(function() {
          if (document.getElementById('root') && !document.getElementById('root').hasChildNodes()) {
            if (!sessionStorage.getItem('boot_recovery')) {
              sessionStorage.setItem('boot_recovery', '1');
              if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(regs) {
                  regs.forEach(function(r) { r.unregister(); });
                  caches.keys().then(function(names) {
                    names.forEach(function(name) { caches.delete(name); });
                  }).then(function() { location.reload(); });
                });
              } else {
                location.reload();
              }
            } else {
              // Show fallback UI instead of blank screen
              var root = document.getElementById('root');
              if (root && !root.hasChildNodes()) {
                root.innerHTML = '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,sans-serif;padding:2rem;text-align:center"><div style="font-size:3rem;margin-bottom:1rem">⚠️</div><h1 style="font-size:1.25rem;font-weight:600;margin-bottom:.5rem">Страницата не успя да се зареди</h1><p style="color:#666;font-size:.875rem;margin-bottom:1.5rem">Моля, опитайте отново</p><button onclick="sessionStorage.removeItem(\'boot_recovery\');location.reload()" style="padding:.5rem 1.25rem;border-radius:.375rem;border:none;background:#3b82f6;color:#fff;font-weight:500;cursor:pointer;font-size:.875rem">Презареди</button></div>';
              }
            }
          }
        }, 8000);
        var observer = new MutationObserver(function() {
          if (document.getElementById('root') && document.getElementById('root').hasChildNodes()) {
            clearTimeout(timeout);
            sessionStorage.removeItem('boot_recovery');
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root') || document.body, { childList: true, subtree: true });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
